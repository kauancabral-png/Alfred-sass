services:
  - type: web
    name: alfred-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: npx prisma db push --accept-data-loss && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alfred-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://fincontrol-saas-umber.vercel.app
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: alfred-db
    databaseName: fincontroldb
    user: alfredmestre
    plan: free
